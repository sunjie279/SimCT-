### Model
model_name_or_path: models/gemma-2-2b-it

### Method
stage: sft
do_train: true
finetuning_type: full

### Dataset
dataset_dir: scripts/sft
dataset: sft_warmup_10k_phi4
template: gemma
cutoff_len: 2048
preprocessing_num_workers: 16
packing: false

### Output
output_dir: output/ckpts/gemma2-2b-sft-warmup-10k-phi4-lr2e-6
logging_steps: 5
save_strategy: steps
save_steps: 20
save_total_limit: 10
save_only_model: true
overwrite_output_dir: true

### Train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-6
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
pure_bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000

### Eval (disabled for speed)
do_eval: false

### Misc
report_to: none
save_safetensors: true
